romantic:
  form: "Ternary (ABA') or through-composed. Big emotional arc."
  structure:
    - "A (bars 1-6): Lyrical theme, rubato phrasing."
    - "B (bars 7-12): Contrasting key or mode, build intensity, chromaticism."
    - "A' (bars 13-16): Return to theme with richer harmony, climactic resolution."
  rhythm:
    treble: "Expressive dotted rhythms. Rubato-style longer notes at phrase peaks. Wide dynamic range."
    bass: "Arpeggiated chords (broken into flowing eighths). Rich pedal tones."
  voicing: "Thick chords (4-5 notes). Chromaticism. Diminished 7ths for drama. Augmented 6th chords."
  melody_style: "Wide leaps for passion (6ths, octaves). Chromatic passing tones. Soaring climax. Sighing appoggiaturas."
