latin:
  form: "Montuno-based. For 16 bars: A (1-8 melodic) + B (9-16 montuno/solo section)."
  structure:
    - "A section (bars 1-8): Melodic theme, clave-aligned phrasing."
    - "B section (bars 9-16): Montuno pattern, more rhythmic energy."
  rhythm:
    treble: "Syncopated. Anticipate beat 1 (play on 'and' of 4). Clave awareness: son clave 3-2 or 2-3."
    bass: "Tumbao pattern: root on 'and' of 2, fifth on beat 4. Anticipated bass."
  voicing: "Open voicings with 7ths. Stacked 4ths for modern Latin."
  melody_style: "Bright upper register. Syncopated short phrases with rests. Pentatonic fragments."
