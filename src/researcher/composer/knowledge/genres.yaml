baroque:
  form: "Binary (||:A:||:B:||). A modulates to dominant, B returns to tonic."
  structure:
    - "A section (bars 1-8): Theme in tonic, modulate to V by bar 8."
    - "B section (bars 9-16): Begin in V or vi, sequence back to tonic."
  rhythm:
    treble: "Running sixteenth notes in sequences. Motor rhythm. Terraced dynamics (sudden p/f changes)."
    bass: "Basso continuo: steady quarter or eighth note walking line. Independent counterpoint."
  voicing: "Invertible counterpoint (voices can swap octaves). Clear two-voice texture."
  melody_style: "Sequences (pattern repeated at different pitch, usually down by step). Ornaments: trills on cadence notes, mordents."
