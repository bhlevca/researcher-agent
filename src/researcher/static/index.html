<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e94560;
        }

        header .model-badge {
            font-size: 0.75rem;
            background: #0f3460;
            color: #94a3b8;
            padding: 0.25rem 0.6rem;
            border-radius: 1rem;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 75%;
            padding: 0.85rem 1.1rem;
            border-radius: 1rem;
            line-height: 1.55;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #f0f0f0;
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
            border-bottom-left-radius: 0.25rem;
        }

        .message.error {
            align-self: flex-start;
            background: #3b1020;
            border: 1px solid #e94560;
            color: #fca5a5;
        }

        .thinking {
            align-self: flex-start;
            color: #64748b;
            font-style: italic;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .thinking .dots span {
            animation: blink 1.4s infinite;
            font-size: 1.5rem;
            line-height: 1;
        }
        .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }

        #input-area {
            padding: 1rem 1.5rem;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 0.75rem;
        }

        #input-area textarea {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            min-height: 2.75rem;
            max-height: 8rem;
        }

        #input-area textarea:focus {
            border-color: #e94560;
        }

        #input-area button {
            background: #e94560;
            color: white;
            border: none;
            padding: 0 1.25rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        #input-area button:hover { background: #c73652; }
        #input-area button:disabled { background: #4a4a5a; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>Research Agent</h1>
        <span class="model-badge" id="model-badge">loading...</span>
    </header>

    <div id="chat-container"></div>

    <div id="input-area">
        <textarea id="user-input" placeholder="Ask me anything..." rows="1"
                  autofocus></textarea>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Auto-resize textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 128) + 'px';
        });

        // Enter to send, Shift+Enter for newline
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Fetch model name on load
        fetch('/info')
            .then(r => r.json())
            .then(d => document.getElementById('model-badge').textContent = d.model)
            .catch(() => {});

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function showThinking() {
            const div = document.createElement('div');
            div.className = 'thinking';
            div.id = 'thinking-indicator';
            div.innerHTML = 'Thinking <span class="dots"><span>.</span><span>.</span><span>.</span></span>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideThinking() {
            const el = document.getElementById('thinking-indicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;
            showThinking();

            try {
                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });

                hideThinking();

                if (!resp.ok) {
                    const err = await resp.json();
                    addMessage('error', `Error: ${err.detail || resp.statusText}`);
                } else {
                    const data = await resp.json();
                    addMessage('assistant', data.response);
                }
            } catch (e) {
                hideThinking();
                addMessage('error', `Connection error: ${e.message}`);
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
