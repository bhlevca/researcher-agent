bossa_nova:
  form: "AABA or verse-based. For 16 bars: A (1-8) + A' (9-16)."
  structure:
    - "A (bars 1-8): Smooth melody, gentle syncopation, ii-V-I harmony."
    - "A' (bars 9-16): Same melody with harmonic variation, resolve warmly."
  rhythm:
    treble: "Gentle syncopation: anticipate beat 3. Legato phrasing. Mix quarters and dotted quarters."
    bass: "Root-fifth-octave pattern. Anticipated bass (play on 'and' of 2). Two-feel (half notes with syncopation)."
  voicing: "Close-voiced maj7 and m7 chords. Smooth 7th chord voice leading. Add 9ths for color."
  melody_style: "Chord-tone melody (mostly 3rds and 7ths of each chord). Smooth, speech-like rhythm. Narrow range (6th). Understated."
  example_bars:
