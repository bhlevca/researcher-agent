folk:
  form: "Strophic (same music, different verses). For 16 bars: AA (8+8, same melody repeated)."
  structure:
    - "A section (bars 1-8): Simple singable melody, strong tonic grounding."
    - "A repeat (bars 9-16): Same melody, slight variation at cadence."
  rhythm:
    treble: "Quarters and halves. Minimal syncopation. Natural speech rhythm."
    bass: "Root-fifth alternation. Simple and steady."
  voicing: "Root position triads. Open 5ths in bass. Diatonic only."
  melody_style: "Stepwise within one octave. Arch contour (rise-peak-fall). Singable phrases ending on tonic or 5th."
  example_bars:
