jazz:
  form: "AABA (32-bar standard) or 12-bar blues. For 16 bars: AA' (8+8 with variation)."
  structure:
    - "A section (bars 1-8): ii-V-I progressions, swung eighths, melodic statement."
    - "A' section (bars 9-16): Same melody varied, stronger cadence at end."
  rhythm:
    treble: "Swing eighths (long-short). Syncopated anticipations. Rests on beat 1 (pickup phrasing)."
    bass: "Walking bass: steady quarter notes connecting chord roots by step or chromatic approach. Root on beat 1, approach target on beat 4."
  voicing: "Rootless voicings (3-7-9-13 or 7-3-13-9). Drop-2 voicings. Avoid root+5th only."
  melody_style: "Chromatic approach tones (half step below target note). Enclosures (above-below-target). Blues notes (b3, b5, b7 of key)."
