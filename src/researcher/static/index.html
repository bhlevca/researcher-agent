<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        header h1 { font-size: 1.2rem; font-weight: 600; color: #e94560; }

        #model-select {
            background: #0f3460; color: #e0e0e0; border: 1px solid #1a3a6e;
            padding: 0.35rem 0.6rem; border-radius: 0.5rem; font-size: 0.8rem;
            font-family: inherit; outline: none; cursor: pointer; max-width: 280px;
        }
        #model-select:focus { border-color: #e94560; }
        #depth-toggle {
            background: #0f3460; color: #94a3b8; border: 1px solid #1a3a6e;
            padding: 0.35rem 0.65rem; border-radius: 0.5rem; font-size: 0.75rem;
            cursor: pointer; white-space: nowrap;
        }
        #depth-toggle:hover { background: #1a3a6e; color: #e0e0e0; }
        #depth-toggle.deep { background: #e94560; color: white; border-color: #e94560; }
        .model-info { font-size: 0.7rem; color: #64748b; margin-left: 0.25rem; }

        /* ── Chat area ── */
        #chat-container {
            flex: 1; overflow-y: auto; padding: 1.5rem;
            display: flex; flex-direction: column; gap: 1rem;
        }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .msg-wrapper.user      { align-self: flex-end; }
        .msg-wrapper.assistant { align-self: flex-start; }
        .msg-wrapper.error     { align-self: flex-start; }

        .message {
            padding: 0.85rem 1.1rem; border-radius: 1rem;
            line-height: 1.55; font-size: 0.95rem;
            word-wrap: break-word; overflow-wrap: break-word;
        }
        .message.user {
            background: #0f3460; color: #f0f0f0;
            border-bottom-right-radius: 0.25rem;
        }
        .message.assistant {
            background: #16213e; border: 1px solid #0f3460;
            border-bottom-left-radius: 0.25rem;
        }
        .message.error {
            background: #3b1020; border: 1px solid #e94560; color: #fca5a5;
        }

        /* Rendered HTML inside messages */
        .message img  { max-width: 100%; display: block; border-radius: 0.5rem; margin: 0.5rem 0; }
        .message p    { margin: 0.4em 0; }
        .message code {
            background: #0d1b2e; padding: 0.15em 0.35em;
            border-radius: 0.25em; font-size: 0.88em;
        }
        .message pre {
            background: #0d1b2e; padding: 0.75rem; border-radius: 0.5rem;
            overflow-x: auto; margin: 0.5em 0;
        }
        .message pre code { background: none; padding: 0; }
        .message a { color: #60a5fa; }

        /* ── Reasoning collapsible ── */
        .reasoning-toggle { margin-top: 0.4rem; }
        .reasoning-toggle summary {
            cursor: pointer; font-size: 0.78rem; color: #64748b;
            user-select: none; padding: 0.25rem 0; list-style: none;
        }
        .reasoning-toggle summary::before { content: '\25b6  '; font-size: 0.65rem; }
        .reasoning-toggle[open] summary::before { content: '\25bc  '; }
        .reasoning-content {
            background: #0d1b2e; border: 1px solid #1a2a4e; border-radius: 0.5rem;
            padding: 0.65rem 0.85rem; margin-top: 0.3rem; font-size: 0.8rem;
            line-height: 1.5; color: #94a3b8; max-height: 300px;
            overflow-y: auto; white-space: pre-wrap; word-wrap: break-word;
        }

        /* Live reasoning during streaming */
        .live-reasoning {
            background: #0d1b2e; border: 1px solid #1a2a4e; border-radius: 0.5rem;
            padding: 0.65rem 0.85rem; font-size: 0.8rem; line-height: 1.5;
            color: #94a3b8; max-height: 300px; overflow-y: auto;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .live-reasoning-label {
            font-size: 0.75rem; color: #e94560; font-weight: 600;
            margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.4rem;
        }
        .live-reasoning-label .pulse {
            width: 8px; height: 8px; border-radius: 50%; background: #e94560;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── Action buttons ── */
        .msg-actions {
            display: flex; gap: 0.4rem; margin-top: 0.35rem;
            opacity: 0; transition: opacity 0.15s;
        }
        .msg-wrapper:hover .msg-actions { opacity: 1; }
        .msg-actions button {
            background: #0f3460; color: #94a3b8; border: 1px solid #1a3a6e;
            padding: 0.2rem 0.55rem; border-radius: 0.35rem; font-size: 0.72rem;
            cursor: pointer; transition: all 0.15s;
        }
        .msg-actions button:hover { background: #1a3a6e; color: #e0e0e0; }

        /* ── Token badge ── */
        .token-badge { font-size: 0.68rem; color: #475569; margin-top: 0.2rem; }

        /* ── Thinking dots ── */
        .thinking {
            align-self: flex-start; color: #64748b; font-style: italic;
            padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .thinking .dots span { animation: blink 1.4s infinite; font-size: 1.5rem; line-height: 1; }
        .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

        /* ── Input area ── */
        #input-area {
            padding: 1rem 1.5rem; background: #16213e;
            border-top: 1px solid #0f3460; display: flex; gap: 0.75rem;
        }
        #input-area textarea {
            flex: 1; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0;
            padding: 0.75rem 1rem; border-radius: 0.75rem; font-family: inherit;
            font-size: 0.95rem; resize: vertical; outline: none;
            min-height: 2.75rem; max-height: 12rem;
        }
        #input-area textarea:focus { border-color: #e94560; }
        #input-area button {
            background: #e94560; color: white; border: none; padding: 0 1.25rem;
            border-radius: 0.75rem; font-size: 1rem; cursor: pointer;
            transition: background 0.15s;
        }
        #input-area button:hover { background: #c73652; }
        #input-area button:disabled { background: #4a4a5a; cursor: not-allowed; }

        /* Mic button */
        #mic-btn {
            background: #0f3460; color: #94a3b8; border: 1px solid #1a3a6e;
            padding: 0 0.9rem; border-radius: 0.75rem; font-size: 1.15rem;
            cursor: pointer; transition: all 0.15s; line-height: 1;
        }
        #mic-btn:hover { background: #1a3a6e; color: #e0e0e0; }
        #mic-btn.recording { background: #e94560; color: white; animation: pulse 1s infinite; border-color: #e94560; }
        #mic-btn.processing { opacity: 0.6; cursor: wait; }

        /* Audio waveform visualizer */
        #visualizer-container {
            display: none; align-items: center; gap: 0.5rem;
            padding: 0.4rem 1.5rem; background: #16213e;
            border-top: 1px solid #0f3460;
        }
        #visualizer-container.active { display: flex; }
        #visualizer-container .viz-label {
            font-size: 0.72rem; color: #e94560; font-weight: 600;
            white-space: nowrap; display: flex; align-items: center; gap: 0.3rem;
        }
        #visualizer-container .viz-label .pulse { width: 6px; height: 6px; border-radius: 50%; background: #e94560; animation: pulse 1s infinite; }
        #audio-visualizer {
            flex: 1; height: 36px; border-radius: 0.35rem;
        }
        #viz-timer { font-size: 0.72rem; color: #94a3b8; font-variant-numeric: tabular-nums; }

        /* Voice controls in header */
        .voice-controls { display: flex; align-items: center; gap: 0.35rem; }
        #voice-select {
            background: #0f3460; color: #e0e0e0; border: 1px solid #1a3a6e;
            padding: 0.25rem 0.4rem; border-radius: 0.4rem; font-size: 0.7rem;
            font-family: inherit; outline: none; cursor: pointer; max-width: 180px;
        }
        #voice-select:focus { border-color: #e94560; }
        #lang-select {
            background: #0f3460; color: #e0e0e0; border: 1px solid #1a3a6e;
            padding: 0.25rem 0.3rem; border-radius: 0.4rem; font-size: 0.7rem;
            font-family: inherit; outline: none; cursor: pointer; width: 52px;
        }
        #lang-select:focus { border-color: #e94560; }
        #dialog-toggle {
            background: #0f3460; color: #94a3b8; border: 1px solid #1a3a6e;
            padding: 0.25rem 0.55rem; border-radius: 0.4rem; font-size: 0.7rem;
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        #dialog-toggle:hover { background: #1a3a6e; color: #e0e0e0; }
        #dialog-toggle.active { background: #e94560; color: white; border-color: #e94560; }

        /* Speaking indicator on assistant messages */
        .speaking-indicator {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.72rem; color: #e94560; margin-top: 0.25rem;
        }
        .speaking-indicator .bars { display: flex; gap: 2px; align-items: flex-end; height: 14px; }
        .speaking-indicator .bars span {
            width: 3px; background: #e94560; border-radius: 1px;
            animation: speakBar 0.8s ease-in-out infinite alternate;
        }
        .speaking-indicator .bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
        .speaking-indicator .bars span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
        .speaking-indicator .bars span:nth-child(3) { height: 14px; animation-delay: 0.3s; }
        .speaking-indicator .bars span:nth-child(4) { height: 8px; animation-delay: 0.45s; }
        @keyframes speakBar { 0% { transform: scaleY(0.4); } 100% { transform: scaleY(1); } }

        /* Stop-speaking button */
        #stop-speak-btn {
            display: none; background: #3b1020; color: #fca5a5; border: 1px solid #e94560;
            padding: 0 0.7rem; border-radius: 0.75rem; font-size: 0.85rem;
            cursor: pointer; transition: all 0.15s;
        }
        #stop-speak-btn.visible { display: inline-block; }
        #stop-speak-btn:hover { background: #5a1020; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
            background: #0f3460; color: #e0e0e0; padding: 0.5rem 1.2rem;
            border-radius: 0.5rem; font-size: 0.85rem; z-index: 100;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .toast.show { opacity: 1; pointer-events: auto; }
        .toast .toast-close {
            background: none; border: none; color: #e0e0e0; cursor: pointer;
            font-size: 1rem; padding: 0 0.2rem; margin-left: 0.3rem; line-height: 1;
        }
        .toast .toast-close:hover { color: #fff; }

        /* ── Session controls ── */
        .header-spacer { flex: 1; }
        .session-controls { display: flex; gap: 0.4rem; align-items: center; }
        .session-controls button {
            background: #0f3460; color: #94a3b8; border: 1px solid #1a3a6e;
            padding: 0.35rem 0.65rem; border-radius: 0.5rem; font-size: 0.75rem;
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .session-controls button:hover { background: #1a3a6e; color: #e0e0e0; }

        /* ── Sessions panel ── */
        .sessions-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 49; display: none;
        }
        .sessions-overlay.open { display: block; }
        .sessions-panel {
            position: fixed; top: 0; right: -340px; width: 340px; height: 100%;
            background: #16213e; border-left: 1px solid #0f3460; z-index: 50;
            display: flex; flex-direction: column; transition: right 0.25s ease;
        }
        .sessions-panel.open { right: 0; }
        .sessions-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.2rem; border-bottom: 1px solid #0f3460;
        }
        .sessions-header h2 { font-size: 1rem; color: #e94560; }
        .sessions-header button {
            background: none; border: none; color: #94a3b8; font-size: 1.2rem;
            cursor: pointer; padding: 0.2rem 0.5rem;
        }
        .sessions-header button:hover { color: #e0e0e0; }
        .sessions-list { flex: 1; overflow-y: auto; padding: 0.75rem; }
        .session-item {
            background: #1a1a2e; border: 1px solid #0f3460; border-radius: 0.5rem;
            padding: 0.65rem 0.85rem; margin-bottom: 0.5rem; cursor: pointer;
            transition: border-color 0.15s;
        }
        .session-item:hover { border-color: #e94560; }
        .session-item.active { border-color: #e94560; background: #1e2240; }
        .session-item-name { font-size: 0.88rem; font-weight: 500; color: #e0e0e0; }
        .session-item-meta { font-size: 0.7rem; color: #64748b; margin-top: 0.2rem; }
        .session-item-actions { display: flex; gap: 0.3rem; margin-top: 0.35rem; }
        .session-item-actions button {
            background: #0f3460; color: #94a3b8; border: 1px solid #1a3a6e;
            padding: 0.15rem 0.5rem; border-radius: 0.3rem; font-size: 0.68rem;
            cursor: pointer;
        }
        .session-item-actions button:hover { background: #1a3a6e; color: #e0e0e0; }
        .session-item-actions button.delete:hover { background: #5a1020; color: #fca5a5; }
        .no-sessions { color: #64748b; font-size: 0.85rem; text-align: center; padding: 2rem; }

        /* ── Auth modal ── */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 200; display: none;
            justify-content: center; align-items: center;
        }
        .auth-overlay.open { display: flex; }
        .auth-box {
            background: #16213e; border: 1px solid #0f3460; border-radius: 0.75rem;
            padding: 2rem; width: 340px; max-width: 90%;
        }
        .auth-box h2 { color: #e94560; font-size: 1.1rem; margin-bottom: 1rem; text-align: center; }
        .auth-box input {
            display: block; width: 100%; background: #1a1a2e; border: 1px solid #0f3460;
            color: #e0e0e0; padding: 0.6rem 0.8rem; border-radius: 0.5rem;
            font-family: inherit; font-size: 0.9rem; margin-bottom: 0.65rem; outline: none;
        }
        .auth-box input:focus { border-color: #e94560; }
        .auth-box .auth-actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
        .auth-box .auth-actions button {
            flex: 1; padding: 0.55rem; border-radius: 0.5rem; font-size: 0.85rem;
            cursor: pointer; border: 1px solid #1a3a6e; transition: all 0.15s;
        }
        .auth-box .auth-btn-primary { background: #e94560; color: white; border-color: #e94560; }
        .auth-box .auth-btn-primary:hover { background: #c73652; }
        .auth-box .auth-btn-secondary { background: #0f3460; color: #94a3b8; }
        .auth-box .auth-btn-secondary:hover { background: #1a3a6e; color: #e0e0e0; }
        .auth-box .auth-toggle { text-align: center; margin-top: 0.75rem; font-size: 0.78rem; color: #64748b; }
        .auth-box .auth-toggle a { color: #60a5fa; cursor: pointer; text-decoration: underline; }
        .auth-box .auth-error { color: #fca5a5; font-size: 0.8rem; margin-bottom: 0.5rem; display: none; }
        /* ── User badge in header ── */
        .user-badge {
            display: flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; color: #94a3b8;
        }
        .user-badge .username { color: #60a5fa; font-weight: 500; }
        .user-badge button {
            background: none; border: none; color: #64748b; font-size: 0.72rem;
            cursor: pointer; padding: 0.15rem 0.35rem;
        }
        .user-badge button:hover { color: #fca5a5; }

        /* ── File upload & chips ── */
        .file-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0 0.5rem; max-height: 4rem; overflow-y: auto; }
        .file-chips:empty { display: none; }
        .file-chip {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: #0f3460; color: #94a3b8; font-size: 0.72rem;
            padding: 0.2rem 0.5rem; border-radius: 0.4rem;
        }
        .file-chip button {
            background: none; border: none; color: #64748b; font-size: 0.7rem;
            cursor: pointer; padding: 0; line-height: 1;
        }
        .file-chip button:hover { color: #fca5a5; }
        #attach-btn {
            background: #0f3460; color: #94a3b8; border: 1px solid #1a3a6e;
            padding: 0.45rem 0.6rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.9rem;
        }
        #attach-btn:hover { background: #1a3a6e; color: #e0e0e0; }
        /* ── Export dropdown ── */
        .export-dropdown { position: relative; display: inline-block; }
        .export-dropdown button.export-trigger {
            background: none; border: 1px solid #1a3a6e; color: #94a3b8;
            font-size: 0.7rem; padding: 0.2rem 0.4rem; border-radius: 0.35rem; cursor: pointer;
        }
        .export-dropdown button.export-trigger:hover { background: #1a3a6e; color: #e0e0e0; }
        .export-menu {
            display: none; position: absolute; bottom: 100%; right: 0;
            background: #16213e; border: 1px solid #0f3460; border-radius: 0.5rem;
            padding: 0.3rem 0; z-index: 50; min-width: 120px;
        }
        .export-menu.open { display: block; }
        .export-menu button {
            display: block; width: 100%; background: none; border: none;
            color: #94a3b8; font-size: 0.75rem; padding: 0.35rem 0.7rem;
            text-align: left; cursor: pointer;
        }
        .export-menu button:hover { background: #1a3a6e; color: #e0e0e0; }
        /* ── Files panel ── */
        .files-panel {
            position: fixed; top: 0; right: -350px; width: 340px; height: 100%;
            background: #16213e; border-left: 1px solid #0f3460;
            z-index: 110; transition: right 0.25s; overflow-y: auto; padding: 1rem;
        }
        .files-panel.open { right: 0; }
        .files-panel-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 105;
        }
        .files-panel-overlay.open { display: block; }
        .files-panel h3 { color: #e94560; font-size: 0.95rem; margin-bottom: 0.75rem; }
        .file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.5rem 0.6rem; border-bottom: 1px solid #0f3460;
        }
        .file-item-name { color: #e0e0e0; font-size: 0.8rem; word-break: break-all; flex: 1; }
        .file-item-size { color: #64748b; font-size: 0.7rem; margin-left: 0.5rem; }
        .file-item button {
            background: none; border: none; color: #64748b; cursor: pointer; font-size: 0.75rem; margin-left: 0.3rem;
        }
        .file-item button:hover { color: #fca5a5; }
    </style>
</head>
<body>
    <header>
        <h1>Research Agent</h1>
        <select id="model-select" title="Switch model">
            <option>loading models...</option>
        </select>
        <button id="depth-toggle" onclick="toggleMemoryDepth()" title="Memory recall depth: shallow=fast, deep=thorough but slow">🧠 Shallow</button>
        <span class="model-info" id="model-info"></span>
        <div class="voice-controls">
            <select id="voice-select" title="TTS voice"><option>loading voices...</option></select>
            <select id="lang-select" title="Speech recognition language">
                <option value="en" selected>EN</option>
                <option value="fr">FR</option>
                <option value="de">DE</option>
                <option value="es">ES</option>
                <option value="pt">PT</option>
                <option value="it">IT</option>
                <option value="nl">NL</option>
                <option value="ru">RU</option>
                <option value="zh">ZH</option>
                <option value="ja">JA</option>
                <option value="ro">RO</option>
            </select>
            <button id="dialog-toggle" onclick="toggleDialogMode()" title="Dialog mode: auto-speak responses &amp; auto-record">🗣️ Dialog</button>
        </div>
        <div class="header-spacer"></div>
        <div class="session-controls">
            <button onclick="newSession()" title="New session">🗒️ New</button>
            <button onclick="saveSession()" title="Save session">💾 Save</button>
            <button onclick="openSessionsPanel()" title="Saved sessions">📂 Sessions</button>
            <button onclick="openFilesPanel()" title="Uploaded files">📁 Files</button>
        </div>
        <div class="user-badge" id="user-badge" style="display:none;">
            <span>👤</span><span class="username" id="user-badge-name"></span>
            <button onclick="logout()" title="Log out">✕</button>
        </div>
        <button id="login-btn" onclick="openAuthModal('login')" style="background:#0f3460;color:#94a3b8;border:1px solid #1a3a6e;padding:0.35rem 0.65rem;border-radius:0.5rem;font-size:0.75rem;cursor:pointer;">🔑 Login</button>
    </header>

    <!-- Auth modal -->
    <div class="auth-overlay" id="auth-overlay" onclick="if(event.target===this)closeAuthModal()">
        <div class="auth-box">
            <h2 id="auth-title">Login</h2>
            <div class="auth-error" id="auth-error"></div>
            <input type="text" id="auth-username" placeholder="Username" autocomplete="username">
            <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
            <input type="text" id="auth-invite" placeholder="Invite code" style="display:none;">
            <!-- Honeypot: invisible to humans, bots auto-fill it -->
            <input type="text" id="auth-website" name="website" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;width:0;">
            <div class="auth-actions">
                <button class="auth-btn-primary" id="auth-submit" onclick="submitAuth()">Login</button>
                <button class="auth-btn-secondary" id="auth-cancel-btn" onclick="closeAuthModal()">Cancel</button>
            </div>
            <div class="auth-toggle" id="auth-toggle">
                No account? <a onclick="switchAuthMode()">Register</a>
            </div>
        </div>
    </div>

    <div class="sessions-overlay" id="sessions-overlay" onclick="closeSessionsPanel()"></div>
    <div class="sessions-panel" id="sessions-panel">
        <div class="sessions-header">
            <h2>Saved Sessions</h2>
            <button onclick="closeSessionsPanel()">✕</button>
        </div>
        <div id="sessions-list" class="sessions-list">
            <div class="no-sessions">No saved sessions</div>
        </div>
    </div>

    <!-- Files panel -->
    <div class="files-panel-overlay" id="files-panel-overlay" onclick="closeFilesPanel()"></div>
    <div class="files-panel" id="files-panel">
        <h3>📁 Uploaded Files <button onclick="closeFilesPanel()" style="float:right;background:none;border:none;color:#64748b;cursor:pointer;font-size:1rem;">✕</button></h3>
        <div id="files-list"></div>
    </div>

    <div id="chat-container"></div>

    <div id="visualizer-container">
        <div class="viz-label"><span class="pulse"></span> Recording</div>
        <canvas id="audio-visualizer"></canvas>
        <span id="viz-timer">0:00</span>
    </div>

    <div id="input-area">
        <input type="file" id="file-input" multiple accept=".txt,.csv,.pdf,.docx,.xlsx,.md,.json" style="display:none" onchange="handleFileSelect(event)">
        <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach files (TXT, CSV, PDF, DOCX, XLSX, MD, JSON)">📎</button>
        <textarea id="user-input" placeholder="Ask me anything..." rows="1" autofocus></textarea>
        <button id="mic-btn" onclick="toggleMic()" title="Voice input (click to record, click again to stop)">🎤</button>
        <button id="stop-speak-btn" onclick="stopSpeaking()" title="Stop speaking">⏹ Stop</button>
        <button id="send-btn" onclick="lastInputWasVoice = false; sendMessage()">Send</button>
    </div>
    <div class="file-chips" id="file-chips"></div>

    <div class="toast" id="toast"></div>

    <script>
        const chat = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const modelInfo = document.getElementById('model-info');

        // ── Conversation state ──
        let chatHistory = [];
        let currentSessionId = null;
        let currentSessionName = null;

        // ══════════════════════════════════════════════
        // ── Auth state & helpers ──
        // ══════════════════════════════════════════════
        let authToken = localStorage.getItem('authToken') || null;
        let authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
        let authMode = 'login';              // 'login' | 'register'
        let inviteRequired = false;

        function authHeaders() {
            const h = {};
            if (authToken) h['Authorization'] = 'Bearer ' + authToken;
            return h;
        }
        function jsonAuthHeaders() {
            return { 'Content-Type': 'application/json', ...authHeaders() };
        }

        function setAuthState(token, user) {
            authToken = token;
            authUser = user;
            if (token) {
                localStorage.setItem('authToken', token);
                localStorage.setItem('authUser', JSON.stringify(user));
            } else {
                localStorage.removeItem('authToken');
                localStorage.removeItem('authUser');
            }
            updateAuthUI();
        }

        function updateAuthUI() {
            const badge = document.getElementById('user-badge');
            const loginBtn = document.getElementById('login-btn');
            const inputArea = document.getElementById('input-area');
            const chatContainer = document.getElementById('chat-container');
            if (authUser) {
                badge.style.display = 'flex';
                document.getElementById('user-badge-name').textContent = authUser.username;
                loginBtn.style.display = 'none';
                inputArea.style.pointerEvents = '';
                inputArea.style.opacity = '';
                chatContainer.style.opacity = '';
            } else {
                badge.style.display = 'none';
                loginBtn.style.display = '';
                // Grey out the UI when not logged in
                inputArea.style.pointerEvents = 'none';
                inputArea.style.opacity = '0.4';
                chatContainer.style.opacity = '0.4';
            }
        }

        function openAuthModal(mode) {
            authMode = mode || 'login';
            const overlay = document.getElementById('auth-overlay');
            const title = document.getElementById('auth-title');
            const submit = document.getElementById('auth-submit');
            const toggle = document.getElementById('auth-toggle');
            const invite = document.getElementById('auth-invite');
            const errEl = document.getElementById('auth-error');
            errEl.style.display = 'none';
            document.getElementById('auth-username').value = '';
            document.getElementById('auth-password').value = '';
            document.getElementById('auth-invite').value = '';
            document.getElementById('auth-website').value = '';

            if (authMode === 'register') {
                title.textContent = 'Register';
                submit.textContent = 'Register';
                toggle.innerHTML = 'Have an account? <a onclick="switchAuthMode()">Login</a>';
                invite.style.display = inviteRequired ? '' : 'none';
            } else {
                title.textContent = 'Login';
                submit.textContent = 'Login';
                toggle.innerHTML = 'No account? <a onclick="switchAuthMode()">Register</a>';
                invite.style.display = 'none';
            }
            // Hide cancel button if login is required (no user logged in)
            const cancelBtn = document.getElementById('auth-cancel-btn');
            if (cancelBtn) cancelBtn.style.display = authUser ? '' : 'none';
            overlay.classList.add('open');
            document.getElementById('auth-username').focus();
        }

        function closeAuthModal() {
            // Cannot close if not logged in
            if (!authUser) return;
            document.getElementById('auth-overlay').classList.remove('open');
        }

        function switchAuthMode() {
            openAuthModal(authMode === 'login' ? 'register' : 'login');
        }

        async function submitAuth() {
            const errEl = document.getElementById('auth-error');
            errEl.style.display = 'none';
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            const inviteCode = document.getElementById('auth-invite').value.trim();
            const website = document.getElementById('auth-website').value;  // honeypot

            if (!username || !password) {
                errEl.textContent = 'Username and password are required';
                errEl.style.display = 'block';
                return;
            }

            const url = authMode === 'register' ? '/auth/register' : '/auth/login';
            const body = { username, password, website };
            if (authMode === 'register') body.invite_code = inviteCode;

            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({ detail: 'Request failed' }));
                    errEl.textContent = err.detail || 'Request failed';
                    errEl.style.display = 'block';
                    return;
                }
                const data = await resp.json();
                setAuthState(data.token, data.user);
                closeAuthModal();
                showToast('Welcome, ' + data.user.username + '!');
                // Reload sessions for this user
                loadModels();
            } catch (e) {
                errEl.textContent = 'Connection error';
                errEl.style.display = 'block';
            }
        }

        function logout() {
            setAuthState(null, null);
            chatHistory = [];
            currentSessionId = null;
            currentSessionName = null;
            chat.innerHTML = '';
            // Turn off dialog mode if active
            if (dialogMode) {
                dialogMode = false;
                const btn = document.getElementById('dialog-toggle');
                btn.classList.remove('active');
                btn.textContent = '🗣️ Dialog';
            }
            // Clear attached files
            clearSessionFiles();
            showToast('Logged out');
            openAuthModal('login');
        }

        // Check if invite code is required, and restore auth state
        (async function initAuth() {
            try {
                const resp = await fetch('/auth/config');
                if (resp.ok) {
                    const cfg = await resp.json();
                    inviteRequired = cfg.invite_required;
                }
            } catch (e) { /* ignore */ }
            // Validate existing token
            if (authToken) {
                try {
                    const resp = await fetch('/auth/me', { headers: authHeaders() });
                    if (!resp.ok) { setAuthState(null, null); }
                } catch (e) { setAuthState(null, null); }
            }
            updateAuthUI();
            // If not logged in, force the login modal open
            if (!authUser) {
                openAuthModal('login');
            } else {
                loadModels();
            }
        })();

        // ── Utilities ──
        let _toastTimer = null;
        function showToast(msg) {
            const t = document.getElementById('toast');
            clearTimeout(_toastTimer);
            t.innerHTML = '';
            const span = document.createElement('span');
            span.textContent = msg;
            t.appendChild(span);
            const btn = document.createElement('button');
            btn.className = 'toast-close';
            btn.innerHTML = '✕';
            btn.onclick = () => { clearTimeout(_toastTimer); t.classList.remove('show'); };
            t.appendChild(btn);
            t.classList.add('show');
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Simple markdown rendering: code blocks, inline code, images, links, bold
        function renderContent(text) {
            text = text.replace(/```(\w*)\n?([\s\S]*?)```/g,
                (_, lang, code) => '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
                '<img src="$2" alt="$1" loading="lazy">');
            text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
                '<a href="$2" target="_blank" rel="noopener">$1</a>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Bare image URLs (http and local /static/ paths)
            text = text.replace(/(^|[\s>])(https?:\/\/\S+\.(?:png|jpg|jpeg|gif|webp|svg))([\s<]|$)/gi,
                '$1<img src="$2" loading="lazy">$3');
            text = text.replace(/(^|[\s>])(\/static\/\S+\.(?:png|jpg|jpeg|gif|webp|svg))([\s<]|$)/gi,
                '$1<img src="$2" loading="lazy">$3');
            text = text.replace(/\n{2,}/g, '</p><p>');
            text = text.replace(/\n/g, '<br>');
            return '<p>' + text + '</p>';
        }

        // ── Auto-resize ──
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 128) + 'px';
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); lastInputWasVoice = false; sendMessage(); }
        });

        // ── Model dropdown ──
        async function loadModels() {
            try {
                const resp = await fetch('/models', { headers: authHeaders() });
                const data = await resp.json();
                modelSelect.innerHTML = '';
                data.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name + ' (' + m.params + ', ' + m.size_gb + ' GB)';
                    const litellmName = 'ollama/' + m.name;
                    if (litellmName === data.current || m.name === data.current) {
                        opt.selected = true;
                        modelInfo.textContent = m.family;
                    }
                    modelSelect.appendChild(opt);
                });
            } catch (e) {
                modelSelect.innerHTML = '<option>error loading models</option>';
            }
        }

        modelSelect.addEventListener('change', async () => {
            const chosen = modelSelect.value;
            modelSelect.disabled = true;
            modelInfo.textContent = 'switching...';
            try {
                const resp = await fetch('/model', {
                    method: 'POST',
                    headers: jsonAuthHeaders(),
                    body: JSON.stringify({ model: chosen }),
                });
                if (resp.ok) {
                    const data = await resp.json();
                    modelInfo.textContent = 'active: ' + data.model;
                    addAssistantMessage('Model switched to ' + data.model, [], {});
                } else {
                    const err = await resp.json();
                    modelInfo.textContent = 'switch failed';
                    addSimpleMsg('error', 'Switch failed: ' + err.detail);
                }
            } catch (e) {
                modelInfo.textContent = 'switch failed';
                addSimpleMsg('error', 'Connection error: ' + e.message);
            } finally { modelSelect.disabled = false; }
        });

        loadModels();

        // ── Memory depth toggle ──
        const depthToggle = document.getElementById('depth-toggle');
        let memoryDepth = 'shallow';

        async function loadMemoryDepth() {
            try {
                const resp = await fetch('/memory-depth');
                const data = await resp.json();
                memoryDepth = data.depth;
                updateDepthUI();
            } catch (e) { /* ignore */ }
        }

        function updateDepthUI() {
            depthToggle.textContent = memoryDepth === 'deep' ? '🧠 Deep' : '🧠 Shallow';
            depthToggle.classList.toggle('deep', memoryDepth === 'deep');
            depthToggle.title = memoryDepth === 'deep'
                ? 'Memory: deep (thorough but slow) — click to switch to shallow'
                : 'Memory: shallow (fast) — click to switch to deep';
        }

        async function toggleMemoryDepth() {
            const newDepth = memoryDepth === 'shallow' ? 'deep' : 'shallow';
            depthToggle.disabled = true;
            try {
                const resp = await fetch('/memory-depth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ depth: newDepth }),
                });
                if (resp.ok) {
                    memoryDepth = newDepth;
                    updateDepthUI();
                }
            } catch (e) { /* ignore */ }
            finally { depthToggle.disabled = false; }
        }

        loadMemoryDepth();

        // ── Message rendering ──
        function addSimpleMsg(role, text) {
            const w = document.createElement('div');
            w.className = 'msg-wrapper ' + role;
            const m = document.createElement('div');
            m.className = 'message ' + role;
            m.textContent = text;
            w.appendChild(m);
            chat.appendChild(w);
            chat.scrollTop = chat.scrollHeight;
        }

        function addAssistantMessage(text, reasoning, tokenUsage) {
            const w = document.createElement('div');
            w.className = 'msg-wrapper assistant';

            const m = document.createElement('div');
            m.className = 'message assistant';
            m.innerHTML = renderContent(text);
            w.appendChild(m);

            // Collapsible reasoning
            if (reasoning && reasoning.length > 0) {
                const det = document.createElement('details');
                det.className = 'reasoning-toggle';
                const sum = document.createElement('summary');
                sum.textContent = 'Show reasoning (' + reasoning.length + ' steps)';
                det.appendChild(sum);
                const c = document.createElement('div');
                c.className = 'reasoning-content';
                c.textContent = reasoning.join('\n');
                det.appendChild(c);
                w.appendChild(det);
            }

            // Token usage
            if (tokenUsage && tokenUsage.total_tokens) {
                const b = document.createElement('div');
                b.className = 'token-badge';
                b.textContent = 'tokens: ' + tokenUsage.total_tokens +
                    ' (' + tokenUsage.prompt_tokens + ' in / ' + tokenUsage.completion_tokens + ' out)';
                w.appendChild(b);
            }

            // Action buttons
            const acts = document.createElement('div');
            acts.className = 'msg-actions';

            const copyBtn = document.createElement('button');
            copyBtn.textContent = '\ud83d\udccb Copy';
            copyBtn.onclick = () => {
                const liveText = m.innerText || text;
                navigator.clipboard.writeText(liveText).then(() => showToast('Copied response'));
            };
            acts.appendChild(copyBtn);

            const saveBtn = document.createElement('button');
            saveBtn.textContent = '\ud83d\udcbe Save';
            saveBtn.onclick = () => saveText(m.innerText || text, null);
            acts.appendChild(saveBtn);

            if (reasoning && reasoning.length > 0) {
                const copyAll = document.createElement('button');
                copyAll.textContent = '\ud83d\udccb Copy all';
                copyAll.onclick = () => {
                    const liveText = m.innerText || text;
                    const full = '=== Response ===\n' + liveText + '\n\n=== Reasoning ===\n' + reasoning.join('\n');
                    navigator.clipboard.writeText(full).then(() => showToast('Copied response + reasoning'));
                };
                acts.appendChild(copyAll);

                const saveAll = document.createElement('button');
                saveAll.textContent = '\ud83d\udcbe Save all';
                saveAll.onclick = () => saveText(m.innerText || text, reasoning);
                acts.appendChild(saveAll);
            }

            // Export dropdown
            const exportDiv = document.createElement('div');
            exportDiv.className = 'export-dropdown';
            const exportTrig = document.createElement('button');
            exportTrig.className = 'export-trigger';
            exportTrig.textContent = '\u2b07\ufe0f Export';
            exportTrig.onclick = (e) => {
                e.stopPropagation();
                // Close any other open export menus
                document.querySelectorAll('.export-menu.open').forEach(m => {
                    if (m !== exportMenu) m.classList.remove('open');
                });
                exportMenu.classList.toggle('open');
            };
            exportDiv.appendChild(exportTrig);
            const exportMenu = document.createElement('div');
            exportMenu.className = 'export-menu';
            ['md', 'txt', 'docx', 'xlsx'].forEach(fmt => {
                const btn = document.createElement('button');
                btn.textContent = fmt.toUpperCase();
                btn.onclick = () => {
                    exportMenu.classList.remove('open');
                    // Use live text from DOM so continuation content is included
                    const liveText = m.innerText || text;
                    exportResponse(liveText, fmt);
                };
                exportMenu.appendChild(btn);
            });
            exportDiv.appendChild(exportMenu);
            acts.appendChild(exportDiv);

            w.appendChild(acts);
            chat.appendChild(w);
            chat.scrollTop = chat.scrollHeight;
            return w;  // return wrapper so TTS can attach speaking indicator
        }

        function saveText(text, reasoning) {
            var content = text;
            if (reasoning && reasoning.length > 0) {
                content += '\n\n--- Reasoning ---\n' + reasoning.join('\n');
            }
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'response-' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.txt';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Saved to file');
        }

        function showThinking() {
            const d = document.createElement('div');
            d.className = 'thinking'; d.id = 'thinking-indicator';
            d.innerHTML = 'Thinking <span class="dots"><span>.</span><span>.</span><span>.</span></span>';
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideThinking() {
            const el = document.getElementById('thinking-indicator');
            if (el) el.remove();
        }

        // ── Send message ──
        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addSimpleMsg('user', text);
            chatHistory.push({ role: 'user', text: text });
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            // Create live reasoning container
            const liveWrapper = document.createElement('div');
            liveWrapper.className = 'msg-wrapper assistant';

            const liveLabel = document.createElement('div');
            liveLabel.className = 'live-reasoning-label';
            liveLabel.innerHTML = '<span class="pulse"></span> Thinking...';
            liveWrapper.appendChild(liveLabel);

            const liveBox = document.createElement('div');
            liveBox.className = 'live-reasoning';
            liveWrapper.appendChild(liveBox);

            chat.appendChild(liveWrapper);
            chat.scrollTop = chat.scrollHeight;

            let reasoningLines = [];

            try {
                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: jsonAuthHeaders(),
                    body: JSON.stringify({ message: text, history: chatHistory, file_ids: getAttachedFileIds() }),
                });

                if (!resp.ok) {
                    liveWrapper.remove();
                    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
                    addSimpleMsg('error', 'Error: ' + (err.detail || resp.statusText));
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Process complete SSE events (separated by \n\n)
                    while (buffer.includes('\n\n')) {
                        const idx = buffer.indexOf('\n\n');
                        const eventStr = buffer.slice(0, idx);
                        buffer = buffer.slice(idx + 2);

                        let eventType = '';
                        let dataStr = '';
                        for (const line of eventStr.split('\n')) {
                            if (line.startsWith('event: ')) eventType = line.slice(7);
                            else if (line.startsWith('data: ')) dataStr += line.slice(6);
                        }

                        if (eventType === 'reasoning' && dataStr) {
                            const line = JSON.parse(dataStr);
                            reasoningLines.push(line);
                            liveBox.textContent = reasoningLines.join('\n');
                            liveBox.scrollTop = liveBox.scrollHeight;
                            chat.scrollTop = chat.scrollHeight;
                        } else if (eventType === 'done' && dataStr) {
                            const result = JSON.parse(dataStr);
                            liveWrapper.remove();
                            const msgWrapper = addAssistantMessage(
                                result.response,
                                result.reasoning || reasoningLines,
                                result.token_usage || {}
                            );
                            chatHistory.push({
                                role: 'assistant',
                                text: result.response,
                                reasoning: result.reasoning || reasoningLines,
                                tokenUsage: result.token_usage || {}
                            });
                            // ── Incomplete: offer to continue ──
                            if (result.incomplete) {
                                const contBtn = document.createElement('button');
                                contBtn.textContent = '🔄 Continue — the agent ran out of steps';
                                contBtn.style.cssText = 'margin-top:0.5rem;background:#e94560;color:white;border:none;padding:0.45rem 1rem;border-radius:0.5rem;cursor:pointer;font-size:0.82rem;';
                                contBtn.onclick = () => {
                                    contBtn.remove();
                                    continueLastRequest();
                                };
                                msgWrapper.appendChild(contBtn);
                            }
                            // ── Dialog: auto-speak then auto-record ──
                            if (dialogMode && result.response) {
                                speakText(result.response, msgWrapper).then(() => {
                                    // Auto-start mic for next turn if last input was voice
                                    if (dialogMode && lastInputWasVoice) {
                                        setTimeout(() => toggleMic(), 400);
                                    }
                                });
                            }
                        } else if (eventType === 'error' && dataStr) {
                            // Preserve reasoning lines and show error below them
                            liveWrapper.remove();
                            const errText = 'Error: ' + JSON.parse(dataStr);
                            if (reasoningLines.length > 0) {
                                // Show reasoning + error together
                                const w = document.createElement('div');
                                w.className = 'msg-wrapper assistant';

                                const errMsg = document.createElement('div');
                                errMsg.className = 'message error';
                                errMsg.textContent = errText;
                                w.appendChild(errMsg);

                                const det = document.createElement('details');
                                det.className = 'reasoning-toggle';
                                det.setAttribute('open', '');
                                const sum = document.createElement('summary');
                                sum.textContent = 'Show reasoning (' + reasoningLines.length + ' steps before error)';
                                det.appendChild(sum);
                                const c = document.createElement('div');
                                c.className = 'reasoning-content';
                                c.textContent = reasoningLines.join('\n');
                                det.appendChild(c);
                                w.appendChild(det);

                                chat.appendChild(w);
                                chat.scrollTop = chat.scrollHeight;
                            } else {
                                addSimpleMsg('error', errText);
                            }
                        }
                    }
                }

                // If stream ended without a 'done' event, show what we have
                if (liveWrapper.parentNode) {
                    liveWrapper.remove();
                    if (reasoningLines.length > 0) {
                        addAssistantMessage(
                            'The agent completed but produced no final answer.',
                            reasoningLines, {}
                        );
                    }
                }
            } catch (e) {
                if (liveWrapper.parentNode) liveWrapper.remove();
                addSimpleMsg('error', 'Connection error: ' + e.message);
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // ── Session management ──
        function newSession() {
            if (chatHistory.length > 0 && !confirm('Start a new session? Unsaved messages will be lost.')) return;
            chatHistory = [];
            currentSessionId = null;
            currentSessionName = null;
            chat.innerHTML = '';
            clearSessionFiles();
            showToast('New session started');
        }

        async function saveSession() {
            if (chatHistory.length === 0) { showToast('Nothing to save'); return; }
            const name = prompt('Session name:', currentSessionName || 'Session ' + new Date().toLocaleDateString());
            if (!name) return;
            try {
                let resp;
                if (currentSessionId) {
                    resp = await fetch('/sessions/' + currentSessionId, {
                        method: 'PUT',
                        headers: jsonAuthHeaders(),
                        body: JSON.stringify({ name: name, messages: chatHistory }),
                    });
                } else {
                    resp = await fetch('/sessions', {
                        method: 'POST',
                        headers: jsonAuthHeaders(),
                        body: JSON.stringify({ name: name, messages: chatHistory }),
                    });
                }
                if (resp.ok) {
                    const data = await resp.json();
                    currentSessionId = data.id;
                    currentSessionName = name;
                    showToast('Session saved: ' + name);
                } else { showToast('Failed to save session'); }
            } catch (e) { showToast('Error saving session'); }
        }

        function openSessionsPanel() {
            document.getElementById('sessions-panel').classList.add('open');
            document.getElementById('sessions-overlay').classList.add('open');
            loadSessionsList();
        }

        function closeSessionsPanel() {
            document.getElementById('sessions-panel').classList.remove('open');
            document.getElementById('sessions-overlay').classList.remove('open');
        }

        async function loadSessionsList() {
            const list = document.getElementById('sessions-list');
            try {
                const resp = await fetch('/sessions', { headers: authHeaders() });
                const data = await resp.json();
                if (data.sessions.length === 0) {
                    list.innerHTML = '<div class="no-sessions">No saved sessions</div>';
                    return;
                }
                list.innerHTML = '';
                data.sessions.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                    const nm = document.createElement('div');
                    nm.className = 'session-item-name';
                    nm.textContent = s.name;
                    item.appendChild(nm);
                    const meta = document.createElement('div');
                    meta.className = 'session-item-meta';
                    const dt = new Date(s.updated_at || s.created_at);
                    meta.textContent = dt.toLocaleString() + ' \u00b7 ' + s.message_count + ' msgs' + (s.model ? ' \u00b7 ' + s.model : '');
                    item.appendChild(meta);
                    const acts = document.createElement('div');
                    acts.className = 'session-item-actions';
                    const loadBtn = document.createElement('button');
                    loadBtn.textContent = '\u25b6 Load';
                    loadBtn.onclick = (e) => { e.stopPropagation(); restoreSession(s.id); };
                    acts.appendChild(loadBtn);
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete';
                    delBtn.textContent = '\u2715 Delete';
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteSession(s.id, s.name); };
                    acts.appendChild(delBtn);
                    item.appendChild(acts);
                    item.onclick = () => restoreSession(s.id);
                    list.appendChild(item);
                });
            } catch (e) {
                list.innerHTML = '<div class="no-sessions">Error loading sessions</div>';
            }
        }

        async function restoreSession(id) {
            try {
                const resp = await fetch('/sessions/' + id, { headers: authHeaders() });
                if (!resp.ok) { showToast('Failed to load session'); return; }
                const data = await resp.json();
                chatHistory = data.messages || [];
                currentSessionId = data.id;
                currentSessionName = data.name;
                chat.innerHTML = '';
                chatHistory.forEach(msg => {
                    if (msg.role === 'user') {
                        addSimpleMsg('user', msg.text);
                    } else if (msg.role === 'assistant') {
                        addAssistantMessage(msg.text, msg.reasoning || [], msg.tokenUsage || {});
                    }
                });
                closeSessionsPanel();
                showToast('Loaded: ' + data.name);
            } catch (e) { showToast('Error loading session'); }
        }

        async function deleteSession(id, name) {
            if (!confirm('Delete session "' + name + '"?')) return;
            try {
                const resp = await fetch('/sessions/' + id, { method: 'DELETE', headers: authHeaders() });
                if (resp.ok) {
                    if (currentSessionId === id) { currentSessionId = null; currentSessionName = null; }
                    loadSessionsList();
                    showToast('Deleted: ' + name);
                }
            } catch (e) { showToast('Error deleting session'); }
        }

        // ══════════════════════════════════════════════
        // ── TTS (Text-to-Speech) engine — server-side via edge-tts ──
        // ══════════════════════════════════════════════
        let ttsVoices = [];
        let selectedVoiceName = localStorage.getItem('ttsVoice') || 'en-US-AriaNeural';
        let dialogMode = false;
        let isSpeaking = false;
        let lastInputWasVoice = false;   // tracks whether user used mic
        let currentAudio = null;         // currently playing Audio element

        async function loadVoices() {
            try {
                const resp = await fetch('/tts/voices', { headers: authHeaders() });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                ttsVoices = await resp.json();
            } catch (e) {
                console.warn('[TTS] Failed to load voices:', e);
                document.getElementById('voice-select').innerHTML = '<option>server TTS unavailable</option>';
                return;
            }
            const sel = document.getElementById('voice-select');
            sel.innerHTML = '';

            // Sort: match current language first, then English, then rest
            const lang = (document.getElementById('lang-select')?.value || 'en').toLowerCase();
            const sorted = [...ttsVoices].sort((a, b) => {
                const aLang = a.locale.toLowerCase().startsWith(lang) ? 0 : (a.locale.startsWith('en') ? 1 : 2);
                const bLang = b.locale.toLowerCase().startsWith(lang) ? 0 : (b.locale.startsWith('en') ? 1 : 2);
                if (aLang !== bLang) return aLang - bLang;
                return a.name.localeCompare(b.name);
            });
            sorted.forEach((v) => {
                const opt = document.createElement('option');
                opt.value = v.name;
                opt.textContent = v.name + ' (' + v.locale + ', ' + v.gender + ')';
                sel.appendChild(opt);
            });

            // Restore saved preference or default
            let found = false;
            for (const opt of sel.options) {
                if (opt.value === selectedVoiceName) {
                    opt.selected = true;
                    found = true;
                    break;
                }
            }
            if (!found && sel.options.length) {
                sel.options[0].selected = true;
                selectedVoiceName = sel.options[0].value;
            }
            console.log('[TTS] Loaded ' + ttsVoices.length + ' server voices, selected: ' + selectedVoiceName);
        }

        // Load voices on startup
        loadVoices();

        document.getElementById('voice-select').addEventListener('change', (e) => {
            selectedVoiceName = e.target.value;
            localStorage.setItem('ttsVoice', selectedVoiceName);
            showToast('Voice: ' + selectedVoiceName);
        });

        function toggleDialogMode() {
            dialogMode = !dialogMode;
            const btn = document.getElementById('dialog-toggle');
            btn.classList.toggle('active', dialogMode);
            btn.textContent = dialogMode ? '🗣️ Dialog ON' : '🗣️ Dialog';
            showToast(dialogMode ? 'Dialog mode ON — responses will be spoken' : 'Dialog mode OFF');
        }

        // Strip markdown/HTML for cleaner TTS (preserve hyphens for foreign words)
        function textForTTS(text) {
            let t = text;
            t = t.replace(/```[\s\S]*?```/g, ' code block omitted ');  // code blocks
            t = t.replace(/`[^`]+`/g, '');            // inline code
            t = t.replace(/!\[[^\]]*\]\([^)]+\)/g, ' image shown ');  // images
            t = t.replace(/\[[^\]]+\]\([^)]+\)/g, (m) => m.replace(/\[([^\]]+)\].*/, '$1')); // links → text
            t = t.replace(/\*\*(.+?)\*\*/g, '$1');     // bold
            t = t.replace(/\*(.+?)\*/g, '$1');          // italic
            t = t.replace(/^#{1,6}\s+/gm, '');          // heading markers at line start
            t = t.replace(/^>\s?/gm, '');                // blockquote markers
            t = t.replace(/~~(.+?)~~/g, '$1');           // strikethrough
            t = t.replace(/\s+/g, ' ').trim();
            return t;
        }

        function speakText(text, wrapper) {
            if (!text) return Promise.resolve();
            return new Promise(async (resolve) => {
                stopSpeaking();  // stop any prior speech
                const clean = textForTTS(text);
                if (!clean) { resolve(); return; }

                // Show speaking indicator on the message
                let indicator = null;
                if (wrapper) {
                    indicator = document.createElement('div');
                    indicator.className = 'speaking-indicator';
                    indicator.innerHTML = '<div class="bars"><span></span><span></span><span></span><span></span></div> Speaking...';
                    wrapper.appendChild(indicator);
                }
                isSpeaking = true;
                document.getElementById('stop-speak-btn').classList.add('visible');

                try {
                    const resp = await fetch('/tts/speak', {
                        method: 'POST',
                        headers: jsonAuthHeaders(),
                        body: JSON.stringify({ text: clean, voice: selectedVoiceName })
                    });
                    if (!resp.ok) throw new Error('TTS server error');
                    const blob = await resp.blob();
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);
                    currentAudio = audio;
                    audio.onended = () => {
                        URL.revokeObjectURL(url);
                        currentAudio = null;
                        if (indicator) indicator.remove();
                        isSpeaking = false;
                        document.getElementById('stop-speak-btn').classList.remove('visible');
                        resolve();
                    };
                    audio.onerror = () => {
                        URL.revokeObjectURL(url);
                        currentAudio = null;
                        if (indicator) indicator.remove();
                        isSpeaking = false;
                        document.getElementById('stop-speak-btn').classList.remove('visible');
                        resolve();
                    };
                    audio.play();
                } catch (e) {
                    console.error('[TTS] Error:', e);
                    if (indicator) indicator.remove();
                    isSpeaking = false;
                    document.getElementById('stop-speak-btn').classList.remove('visible');
                    resolve();
                }
            });
        }

        function stopSpeaking() {
            isSpeaking = false;
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            document.getElementById('stop-speak-btn').classList.remove('visible');
            // Remove any speaking indicators
            document.querySelectorAll('.speaking-indicator').forEach(el => el.remove());
        }

        // ══════════════════════════════════════════════
        // ── Audio recording with waveform visualizer ─
        // ══════════════════════════════════════════════
        let mediaRecorder = null;
        let audioChunks = [];
        let audioContext = null;
        let analyser = null;
        let vizAnimFrame = null;
        let vizTimerInterval = null;
        let vizStartTime = 0;

        function startVisualizer(stream) {
            const container = document.getElementById('visualizer-container');
            const canvas = document.getElementById('audio-visualizer');
            container.classList.add('active');

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);

            const bufLen = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufLen);
            const ctx = canvas.getContext('2d');

            // Match canvas to CSS size
            canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
            canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
            ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
            const W = canvas.offsetWidth;
            const H = canvas.offsetHeight;

            function draw() {
                vizAnimFrame = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                ctx.clearRect(0, 0, W, H);
                const barW = Math.max(2, (W / bufLen) * 2.5);
                const gap = 1;
                let x = 0;
                for (let i = 0; i < bufLen; i++) {
                    const v = dataArray[i] / 255;
                    const barH = Math.max(2, v * H);
                    // Gradient from #e94560 at top to #0f3460 at bottom
                    const r = Math.round(233 * v + 15 * (1 - v));
                    const g = Math.round(69 * v + 52 * (1 - v));
                    const b = Math.round(96 * v + 96 * (1 - v));
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x, H - barH, barW, barH);
                    x += barW + gap;
                    if (x > W) break;
                }
            }
            draw();

            // Timer
            vizStartTime = Date.now();
            const timerEl = document.getElementById('viz-timer');
            timerEl.textContent = '0:00';
            vizTimerInterval = setInterval(() => {
                const sec = Math.floor((Date.now() - vizStartTime) / 1000);
                timerEl.textContent = Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
            }, 500);
        }

        function stopVisualizer() {
            const container = document.getElementById('visualizer-container');
            container.classList.remove('active');
            if (vizAnimFrame) { cancelAnimationFrame(vizAnimFrame); vizAnimFrame = null; }
            if (vizTimerInterval) { clearInterval(vizTimerInterval); vizTimerInterval = null; }
            if (audioContext) { audioContext.close().catch(() => {}); audioContext = null; }
        }

        async function toggleMic() {
            const micBtn = document.getElementById('mic-btn');

            // If currently recording, stop
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);

                // Start waveform visualiser
                startVisualizer(stream);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    stopVisualizer();
                    micBtn.classList.remove('recording');
                    micBtn.classList.add('processing');
                    micBtn.textContent = '⏳';

                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    const form = new FormData();
                    form.append('file', blob, 'recording.webm');
                    const lang = document.getElementById('lang-select').value;

                    try {
                        const resp = await fetch('/transcribe?language=' + lang, { method: 'POST', body: form, headers: authHeaders() });
                        if (resp.ok) {
                            const data = await resp.json();
                            if (data.text) {
                                lastInputWasVoice = true;
                                if (dialogMode) {
                                    // True dialog: auto-send immediately
                                    input.value = data.text;
                                    sendMessage();
                                } else {
                                    input.value = (input.value ? input.value + ' ' : '') + data.text;
                                    input.dispatchEvent(new Event('input'));
                                    input.focus();
                                }
                            } else {
                                showToast('No speech detected');
                            }
                        } else {
                            showToast('Transcription failed');
                        }
                    } catch (e) {
                        showToast('Transcription error: ' + e.message);
                    } finally {
                        micBtn.classList.remove('processing');
                        micBtn.textContent = '🎤';
                    }
                };

                mediaRecorder.start();
                micBtn.classList.add('recording');
                micBtn.textContent = '⏹';
            } catch (e) {
                showToast('Microphone access denied');
            }
        }

        // ══════════════════════════════════════════════
        // ── File upload & management ──
        // ══════════════════════════════════════════════
        let attachedFiles = [];  // [{id, filename}] — chips currently shown
        let sessionFileIds = new Set();  // all file IDs used in this session

        // Close export menus on outside click
        document.addEventListener('click', () => {
            document.querySelectorAll('.export-menu.open').forEach(m => m.classList.remove('open'));
        });

        document.getElementById('attach-btn').onclick = () => {
            document.getElementById('file-input').click();
        };

        async function handleFileSelect(event) {
            const fileList = event.target.files;
            if (!fileList || fileList.length === 0) return;
            const formData = new FormData();
            for (const f of fileList) formData.append('files', f);
            try {
                const resp = await fetch('/files/upload', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: formData,
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    showToast('Upload failed: ' + (err.detail || resp.statusText));
                    return;
                }
                const data = await resp.json();
                for (const f of data.files) {
                    if (f.error) {
                        showToast(f.filename + ': ' + f.error);
                    } else {
                        attachedFiles.push({ id: f.id, filename: f.filename });
                        sessionFileIds.add(f.id);
                        addFileChip(f.id, f.filename);
                    }
                }
            } catch (e) {
                showToast('Upload error: ' + e.message);
            }
            event.target.value = '';
        }

        function addFileChip(id, filename) {
            const chips = document.getElementById('file-chips');
            const chip = document.createElement('span');
            chip.className = 'file-chip';
            chip.dataset.fileId = id;
            chip.innerHTML = '📄 ' + filename + ' <button onclick="removeFileChip(\'' + id + '\')">&times;</button>';
            chips.appendChild(chip);
        }

        function removeFileChip(id) {
            attachedFiles = attachedFiles.filter(f => f.id !== id);
            const chip = document.querySelector('.file-chip[data-file-id="' + id + '"]');
            if (chip) chip.remove();
        }

        function getAttachedFileIds() {
            return [...sessionFileIds];
        }

        function clearFileChips() {
            attachedFiles = [];
            document.getElementById('file-chips').innerHTML = '';
        }

        function clearSessionFiles() {
            attachedFiles = [];
            sessionFileIds.clear();
            document.getElementById('file-chips').innerHTML = '';
        }

        // ── Files panel ──
        function openFilesPanel() {
            document.getElementById('files-panel').classList.add('open');
            document.getElementById('files-panel-overlay').classList.add('open');
            loadFilesList();
        }

        function closeFilesPanel() {
            document.getElementById('files-panel').classList.remove('open');
            document.getElementById('files-panel-overlay').classList.remove('open');
        }

        async function loadFilesList() {
            const list = document.getElementById('files-list');
            try {
                const resp = await fetch('/files', { headers: authHeaders() });
                const data = await resp.json();
                if (!data.files || data.files.length === 0) {
                    list.innerHTML = '<div style="color:#64748b;text-align:center;padding:2rem;">No uploaded files</div>';
                    return;
                }
                list.innerHTML = '';
                data.files.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    const info = document.createElement('div');
                    info.innerHTML = '<div class="file-item-name">📄 ' + f.filename + '</div>' +
                        '<div class="file-item-size">' + (f.size / 1024).toFixed(1) + ' KB · ' + f.extension + '</div>';
                    item.appendChild(info);
                    const delBtn = document.createElement('button');
                    delBtn.textContent = '✕';
                    delBtn.style.cssText = 'background:none;border:none;color:#ef4444;cursor:pointer;font-size:1rem;';
                    delBtn.onclick = () => deleteFileFromPanel(f.id, f.filename);
                    item.appendChild(delBtn);
                    list.appendChild(item);
                });
            } catch (e) {
                list.innerHTML = '<div style="color:#ef4444;text-align:center;">Error loading files</div>';
            }
        }

        async function deleteFileFromPanel(id, name) {
            if (!confirm('Delete file "' + name + '"?')) return;
            try {
                const resp = await fetch('/files/' + id, { method: 'DELETE', headers: authHeaders() });
                if (resp.ok) {
                    removeFileChip(id);
                    loadFilesList();
                    showToast('Deleted: ' + name);
                }
            } catch (e) { showToast('Error deleting file'); }
        }

        // ── Continue incomplete request ──
        async function continueLastRequest() {
            try {
            showToast('Continue: starting…');
            // Find the last user message and last assistant response
            let lastUserMsg = '';
            for (let i = chatHistory.length - 1; i >= 0; i--) {
                if (chatHistory[i].role === 'user') {
                    lastUserMsg = chatHistory[i].text;
                    break;
                }
            }
            const lastAssistant = chatHistory.length > 0 ? chatHistory[chatHistory.length - 1].text : '';

            // Find the last assistant message wrapper to append to
            const allMsgWrappers = document.querySelectorAll('.msg-wrapper.assistant');
            const lastMsgWrapper = allMsgWrappers[allMsgWrappers.length - 1];
            const lastMsgDiv = lastMsgWrapper ? lastMsgWrapper.querySelector('.message.assistant') : null;

            // Show a "continuing…" indicator in the chat
            const spinner = document.createElement('div');
            spinner.className = 'msg-wrapper assistant';
