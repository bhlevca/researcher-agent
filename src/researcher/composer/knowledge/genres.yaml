# ── Genre-Specific Composition Knowledge ─────────────────────────
# Per-genre templates: form, rhythm patterns, voicings, motif style,
# and 2-bar example measures in JSON format.
#
# Beat notation: "1" = beat 1, "2+" = and-of-2, "." = rest/silent
# Duration values match JSON schema: whole, half, quarter, eighth, 16th

classical:
  form: "Binary (AB) or Ternary (ABA). 8-bar A section + 8-bar B section."
  structure:
    - "A section (bars 1-8): Expose theme in tonic, half cadence at bar 8."
    - "B section (bars 9-16): Develop/contrast, authentic cadence at bar 16."
  rhythm:
    treble: "Mix of quarters and eighths. Occasional dotted quarter + eighth."
    bass: "Alberti bass: broken chord pattern (root-5th-3rd-5th) in eighths, or block chords in half notes."
  voicing: "Close position triads. Root position and first inversion. Bass in root position."
  melody_style: "Graceful stepwise motion with occasional 3rd leaps. Ornamental turns at phrase ends."
  example_bars:
    - notes:
        - {pitch: "E5", duration: "quarter", staff: 1}
        - {pitch: "D5", duration: "quarter", staff: 1}
        - {pitch: "C5", duration: "quarter", staff: 1}
