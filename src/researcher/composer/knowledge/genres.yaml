pop:
  form: "Verse-Chorus. For 16 bars: Verse (bars 1-8) + Chorus (bars 9-16)."
  structure:
    - "Verse (bars 1-8): Lower register, simpler rhythm, build momentum."
    - "Chorus (bars 9-16): Higher register, catchier hook melody, fuller texture."
  rhythm:
    treble: "Quarter and eighth note hooks. Syncopation on 'and' of beat 2 or 4. Repetitive rhythmic motif."
    bass: "Root on beat 1, octave on beat 3. Simple and supportive."
  voicing: "Triads, occasional sus2/sus4 for color. Power chords (root+5th) in bass."
  melody_style: "Hook-based: short memorable 2-3 note motif repeated. Pentatonic melody. Narrow range (6th-octave)."
  example_bars:
