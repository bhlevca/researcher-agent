electronic:
  form: "Build-Drop. For 16 bars: Build (1-8, adding layers) + Drop (9-16, full energy)."
  structure:
    - "Build (bars 1-8): Start sparse, add rhythmic layers, crescendo."
    - "Drop (bars 9-16): Full pattern, driving rhythm, peak energy."
  rhythm:
    treble: "Arpeggiated sixteenth-note patterns. Repetitive ostinato. Filtered sweep effect via register."
    bass: "Four-on-the-floor quarter notes (root) or pulsing eighths."
  voicing: "Stacked 5ths and octaves. Minimal 3rds (ambiguous tonality). Sus2/sus4 chords."
  melody_style: "Short 1-2 note motif repeated with filter/register changes. Minimal pitch variation. Rhythmic interest over melodic."
  example_bars:
