impressionist:
  form: "Free or ABA'. Sections blur without strong cadences."
  structure:
    - "Section A (bars 1-6): Floating theme over pedal tone."
    - "Section B (bars 7-12): Shift color (mode, register), parallel chords."
    - "Return (bars 13-16): Echo of A with altered harmony."
  rhythm:
    treble: "Flowing triplets and quintuplets. Harp-like arpeggios. Avoid strong downbeat emphasis."
    bass: "Sustained pedal tones (hold one note for 2-4 bars). Gentle bass motion in whole notes."
  voicing: "Parallel chords (same voicing moved in parallel). Whole-tone clusters. Added-note chords (add9, add6). Quartal voicings."
  melody_style: "Pentatonic and whole-tone fragments. Avoid leading tone resolution. Float above harmony. Coloristic register shifts."
  example_bars:
    - notes:
        - {pitch: "D5", duration: "quarter", staff: 1}
