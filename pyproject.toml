[project]
name = "researcher-agent"
version = "0.5.0"
dependencies = [
    "upsonic[tools]",
    "fastapi",
    "uvicorn",
    "python-dotenv",
    "httpx",
    "Pillow",
    "diffusers",
    "transformers",
    "accelerate",
    "safetensors",
    "aiosqlite",
    "openai-whisper",
    "edge-tts",
    "langdetect",
    "bcrypt",
    "PyJWT",
    "pymupdf",
    "python-docx",
    "openpyxl",
    "litellm",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-asyncio",
    "httpx",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]