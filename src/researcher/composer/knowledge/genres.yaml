film:
  form: "Through-composed or ABA. For 16 bars: A (1-6 theme) + B (7-12 development) + A' (13-16 resolution)."
  structure:
    - "Theme (bars 1-6): Lyrical melody, moderate dynamics."
    - "Development (bars 7-12): Build intensity, wider intervals, richer harmony."
    - "Resolution (bars 13-16): Return to theme, resolve grandly."
  rhythm:
    treble: "Long sustained notes (halves, dotted halves) with expressive shorter fills. Wide leaps for drama."
    bass: "Sustained pedal tones. Octave tremolo for intensity. Slow arpeggios."
  voicing: "Wide spacing (open voicings). Octave doubling for power. Modal interchange (borrow from parallel minor/major)."
  melody_style: "Soaring legato lines. Large interval leaps (5ths, 6ths, octaves) for emotional impact. Build to one climax note."
  example_bars:
    - notes:
        - {pitch: "C5", duration: "dotted half", staff: 1}
