ragtime:
  form: "Multi-strain: AA BB A CC. For 16 bars: A (1-8) + B (9-16), each with repeat feel."
  structure:
    - "A strain (bars 1-8): Syncopated melody over march bass."
    - "B strain (bars 9-16): Contrasting theme, possibly in IV key area."
  rhythm:
    treble: "Syncopated: dotted eighth + sixteenth, or eighth-quarter-eighth (tied anticipation). Jaunty feel."
    bass: "Oom-pah: root on beats 1 & 3, chord (3rd+5th) on beats 2 & 4. Steady, march-like."
  voicing: "Octave bass notes on 1 & 3. Chords in mid-range on 2 & 4. Stride piano style."
  melody_style: "Syncopated, bouncy. Chromatic passing tones. Pickup notes into downbeats. Lively character."
