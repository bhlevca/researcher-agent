        - {pitch: "G5", duration: "quarter", staff: 1}
        - {pitch: "C3", duration: "whole", staff: 2}

minimalist:
  form: "Additive/phase. Gradual accumulation. No traditional sections."
  structure:
    - "Bars 1-4: Establish pattern (1-2 note ostinato)."
    - "Bars 5-8: Add one note to pattern."
    - "Bars 9-12: Shift phase or add rhythmic displacement."
    - "Bars 13-16: Full pattern with all accumulated elements."
  rhythm:
    treble: "Steady eighth or sixteenth note pulse. Additive rhythm (add one beat per repetition). Phase shifting."
    bass: "Pedal tone or slow-moving fundamentals (one note per 2-4 bars)."
  voicing: "Open 5ths and octaves. Triads in first inversion. Limited pitch set (3-5 notes total)."
  melody_style: "Repetitive motif with micro-variations. Gradually expand range. Hypnotic, meditative quality."
  example_bars:
