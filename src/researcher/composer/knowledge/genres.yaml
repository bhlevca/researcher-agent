blues:
  form: "12-bar blues (I-I-I-I / IV-IV-I-I / V-IV-I-V). For 16 bars: 12-bar + 4-bar turnaround."
  structure:
    - "Bars 1-4: Tonic statement, call phrase."
    - "Bars 5-8: Subdominant response, tonic return."
    - "Bars 9-12: Dominant tension, resolve to tonic."
    - "Bars 13-16: Turnaround (I-IV-I-V7) back to top."
  rhythm:
    treble: "Shuffle feel (triplet-based swing). Bent notes (grace notes from b3 to 3). Call-and-response phrasing."
    bass: "Boogie-woogie pattern: root-3rd-5th-6th ascending in steady quarters/eighths. Or simple root-5th shuffle."
  voicing: "Dominant 7th chords everywhere. Blue notes (b3, b5, b7) mixed with diatonic."
  melody_style: "Blues scale based. Start phrases on b3 or b7. Bend from b3 to 3 (grace note). End phrases on root or 5th."
  example_bars:
