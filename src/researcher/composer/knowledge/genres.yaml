hymn:
  form: "Chorale. 4 phrases of 4 bars each. ABAB or ABAC."
  structure:
    - "Phrase 1 (bars 1-4): Statement in tonic."
    - "Phrase 2 (bars 5-8): Move to V or vi, half cadence."
    - "Phrase 3 (bars 9-12): Similar to phrase 1 or contrasting."
    - "Phrase 4 (bars 13-16): Final authentic cadence, Amen."
  rhythm:
    treble: "Homophonic: all voices move together. One chord per beat. Quarters and halves."
    bass: "One note per beat matching the chord. Root position mostly. Occasional first inversion."
  voicing: "Four-part chorale (SATB compressed to two staves). Close spacing in upper voices."
  melody_style: "Stepwise, dignified. Narrow range (octave). Strong downbeats. Long note at phrase end (fermata feel)."
