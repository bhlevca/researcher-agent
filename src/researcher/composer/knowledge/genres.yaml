rock:
  form: "Verse-Chorus or Riff-based. For 16 bars: Intro/Riff (1-4) + Verse (5-12) + Chorus (13-16)."
  structure:
    - "Riff (bars 1-4): Strong rhythmic pattern, power chords."
    - "Verse (bars 5-12): Melody over driving rhythm."
    - "Chorus (bars 13-16): Highest energy, anthem-like melody."
  rhythm:
    treble: "Driving eighth notes. Pentatonic melody. Strong accents on beats 2 and 4 (backbeat)."
    bass: "Root notes with octave jumps. Driving eighths matching guitar rhythm."
  voicing: "Power chords (root+5th). Open voicings. Avoid delicate arpeggios."
  melody_style: "Pentatonic with blue notes. Short punchy phrases. Call-and-response between vocal range and riff."
  example_bars:
