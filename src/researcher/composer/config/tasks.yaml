compose_chat_task:
  description: >
    You are collaborating with a musician/composer working in {genre} style.
    The project is in {key_signature}, {time_signature} time at {tempo} BPM.

    Conversation context:
    {context}

    User's message: "{message}"

    Respond helpfully as a composition collaborator. If the user asks about
    music theory, explain clearly. If they ask you to compose or generate
    notation, produce a JSON score object wrapped in ```json fences.

    MANDATORY TOOL WORKFLOW — follow these steps IN ORDER:
    Step 1: Call scale_reference to get the scale notes.
    Step 2: Call chord_progression_builder to get a chord progression.
    Step 3: Call JSONScoreTemplate to get a JSON skeleton with the right structure.
    Step 4: Fill in the skeleton with your composed notes and output as Final Answer.
    Do NOT skip Step 3. Do NOT try to write JSON from scratch.

    When composing a score:
    - Output a JSON object with "title", "composer", and "parts" array.
    - Each part has "name" and "measures" array.
    - Each measure has a "notes" array with pitch and duration.
    - Use the project key signature, time signature, and tempo.
    - For Piano: ONE part with "staff": 1 (treble) and "staff": 2 (bass)
      notes TOGETHER in each measure. Never split into separate parts.
    - Use varied rhythms (mix quarter, eighth, dotted quarter, half).
      Do NOT write all quarter notes.
    - Create melodic contour — notes go up AND down, not just ascending arpeggios.
    - Bass staff should differ from treble (broken chords, sustained notes, etc.).
    - Make each measure sound different — avoid repeating the same pattern.
    - Compose 8-16 measures unless the user specifies a different length.
    - NEVER output XML or MusicXML. Only output JSON.
  expected_output: >
    A helpful response about music composition. If notation was requested,
    include a JSON score object in ```json fences. Use markdown for
    explanations and analysis. NEVER output XML.
  agent: music_composer

compose_score_task:
  description: >
    Compose a musical score based on this description:

    "{description}"

    Parameters:
    - Genre/Style: {genre} {style}
    - Key: {key_signature}
    - Time signature: {time_signature}
    - Tempo: {tempo} BPM
    - Instruments: {instruments}
    - Length: {measures} measures

    MANDATORY TOOL WORKFLOW — follow these steps IN ORDER:
    Step 1: Call scale_reference to get the scale notes.
    Step 2: Call chord_progression_builder to get a chord progression.
    Step 3: Call JSONScoreTemplate to get a JSON skeleton with the right structure.
    Step 4: Fill in the skeleton with your composed notes and output as Final Answer.
    Do NOT skip Step 3. Do NOT try to write JSON from scratch.

    Generate a COMPLETE JSON score object with:
    1. "title" and "composer" fields
    2. A "parts" array with one entry per instrument
    3. Each part has {measures} measures of composed music
    4. Meaningful melodic and harmonic content matching the description
    5. Correct note durations that fill each measure completely
    6. Musical variety — NEVER repeat the same measure pattern

    CRITICAL RULES:
    - Output JSON inside ```json fences. NEVER output XML.
    - For Piano/Harp: ONE part with "staff": 1 and "staff": 2 notes
      in the SAME measure. Never split into separate parts.
    - Use varied rhythms per measure: mix quarter, eighth, dotted quarter,
      half, dotted half. Do NOT write all quarter notes.
    - Create melodic contour — stepwise motion with occasional leaps.
      Do NOT write ascending arpeggios in every measure.
    - Bass staff should use different patterns than treble (broken chords,
      Alberti bass, sustained notes, walking bass, etc.).
    - Duration values: "whole", "half", "dotted half", "quarter",
      "dotted quarter", "eighth", "16th"
    - Pitch format: "C4", "F#5", "Bb3", "rest"
    - Durations per staff MUST sum correctly per measure
      (4/4 = 4 quarters, 3/4 = 3 quarters)

    Before the JSON, provide a brief description of the composition:
    - Form/structure overview
    - Key musical ideas and motifs
    - Harmonic approach
  expected_output: >
    A brief compositional description in markdown followed by a complete
    JSON score object wrapped in ```json fences. The score must have
    {measures} measures for each instrument. NEVER output XML.
  agent: music_composer

harmonize_task:
  description: >
    Harmonize the following melody:

    {melody}

    Style: {style}
    Key: {key_signature}
    Time signature: {time_signature}

    Provide:
    1. **Chord Analysis** — Roman numeral analysis of your harmonization
    2. **Chord Symbols** — Standard chord symbols above the staff
    3. **Voice Leading** — Explain your voice-leading decisions
    4. **Full Score** — Complete JSON score object with the melody and
       harmony parts in ```json fences
    5. **Alternative Harmonizations** — Suggest 2-3 reharmonization options

    Output the score as JSON, NEVER as XML.
  expected_output: >
    A detailed harmonization analysis in markdown with chord analysis,
    voice-leading explanations, and a complete JSON score object.
    Include alternative harmonization suggestions. NEVER output XML.
  agent: music_composer

analyze_task:
  description: >
    Analyze the following musical content:

    {content}

    Provide a comprehensive musical analysis including:
    1. **Form Analysis** — Overall structure (e.g., ABA, sonata, 12-bar blues)
    2. **Harmonic Analysis** — Roman numeral analysis, key areas, modulations
    3. **Melodic Analysis** — Motifs, sequences, contour, range
    4. **Rhythmic Analysis** — Patterns, syncopation, meter
    5. **Texture & Voicing** — Part writing, doublings, spacing
    6. **Style & Context** — Genre characteristics, influences
    7. **Strengths** — What works well in this passage
    8. **Suggestions** — Concrete improvements or variations to consider

    If the input includes MusicXML, parse and analyze the actual notation.
    Use markdown tables for chord progressions and form diagrams.
  expected_output: >
    A detailed, structured musical analysis in markdown with all 8 sections.
    Include specific measure references and musical examples where helpful.
    Be precise with music theory terminology.
  agent: music_composer
